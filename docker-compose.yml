services:

  # ---------------------------------------------------------------------------
  # GeoServer — WMS/WFS map server
  # Internal port 8080, exposed as 8600 to avoid conflicts.
  #
  # To connect GeoServer to your local PostGIS, use host.docker.internal
  # as the host when creating a datastore in the GeoServer web UI.
  # Example: host.docker.internal:5432 / database: busrouting
  # ---------------------------------------------------------------------------
  geoserver:
    image: kartoza/geoserver:2.25.2
    env_file: .env
    environment:
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD}
      GEOSERVER_DATA_DIR: /opt/geoserver/data_dir
      GEOWEBCACHE_CACHE_DIR: /opt/geoserver/data_dir/gwc
      CORS_ENABLED: "true"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
    ports:
      - "8600:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/geoserver/web/ | grep -q '200\\|302'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

volumes:
  geoserver_data:
